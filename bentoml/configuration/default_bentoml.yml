#
# default_bentoml.yml is currently working-in-progress. Configuration changes
# should still be made to default_bentoml.cfg.
#

bento_server:
  port: 5000
  ngrok:
    enabled: False
  workers: 1
  timeout: 60
  max_request_size: 20971520
  microbatch:
    enabled: False
    workers: 1
    max_batch_size: Null
    max_latency: Null
  swagger:
    enabled: True
  metrics:
    enabled: True
    namespace: BENTOML
  feedback:
    enabled: True
  logging:
    level: INFO
  cors:  # standard: https://fetch.spec.whatwg.org/#http-cors-protocol
    access_control_allow_origin: "*"
    access_control_allow_credentials: Null
    access_control_allow_methods:
      - POST
      - GET
      - OPTIONS
    access_control_allow_headers: []
    access_control_max_age: 5
    access_control_expose_headers: []
    #
    Access-Control-Allow-Origin: "*"
    Access-Control-Allow-Credentials: Null
    Access-Control-Allow-Methods:
      - POST
      - GET
      - OPTIONS
    Access-Control-Allow-Headers: []
    Access-Control-Max-Age: 5
    Access-Control-Expose-Headers: []

tracing:
  type: zipkin
  zipkin:
    url: Null
  jaeger:
    address: Null
    port: Null

adapters:
  image_input:
    default_extensions:
      - .jpg
      - .png
      - .jpeg
      - .tiff
      - .webp
      - .bmp
